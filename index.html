<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD JobHub - Job Portal</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f5f9; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- App Container -->
    <div id="app" class="flex-grow flex flex-col"></div>

    <script>
        // --- STATE MANAGEMENT ---
        let activeTab = 'board';
        let expandedJobId = null;
        let editingJobId = null;
        let isAuthenticated = false;
        const ADMIN_PASSWORD = "admin123";

        // Initial Data
        const initialJobs = [
            {
                id: 1,
                title: "Frontend Developer (React)",
                company: "Tech Solutions Ltd",
                location: "Dhaka, Bangladesh (Remote)",
                type: "Full-time",
                applyLink: "https://example.com/apply",
                description: "We are looking for an experienced React developer to join our dynamic team. You will be responsible for building responsive user interfaces and integrating with backend APIs. Strong proficiency in JavaScript, React.js, and Tailwind CSS is required.",
                date: new Date().toLocaleDateString()
            },
            {
                id: 2,
                title: "Digital Marketing Specialist",
                company: "Creative Media Agency",
                location: "Gulshan, Dhaka",
                type: "Part-time",
                applyLink: "https://example.com/apply",
                description: "Join our creative team to manage social media campaigns, SEO, and content marketing strategies. Must have 2+ years of experience in digital marketing.",
                date: new Date().toLocaleDateString()
            }
        ];

        // Load Jobs from Local Storage
        let jobs = [];
        const savedJobs = localStorage.getItem('vanilla_jobs');
        if (savedJobs) {
            jobs = JSON.parse(savedJobs);
        } else {
            jobs = [...initialJobs];
            localStorage.setItem('vanilla_jobs', JSON.stringify(jobs));
        }

        // --- FUNCTIONS ---
        function saveToLocal() {
            localStorage.setItem('vanilla_jobs', JSON.stringify(jobs));
        }

        function switchTab(tab) {
            activeTab = tab;
            if (tab === 'board') editingJobId = null; // reset edit mode when leaving admin
            render();
        }

        function toggleDescription(id) {
            expandedJobId = expandedJobId === id ? null : id;
            render();
        }

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('admin_password').value;
            if (password === ADMIN_PASSWORD) {
                isAuthenticated = true;
                render();
            } else {
                alert("Incorrect password! Hint: use admin123");
            }
        }

        function handleLogout() {
            isAuthenticated = false;
            editingJobId = null;
            render();
        }

        function handlePostJob(event) {
            event.preventDefault();
            
            const title = document.getElementById('job_title').value;
            const company = document.getElementById('company_name').value;
            const location = document.getElementById('job_location').value;
            const type = document.getElementById('job_type').value;
            const applyLink = document.getElementById('apply_link').value;
            const description = document.getElementById('job_description').value;

            if (editingJobId) {
                // Update
                jobs = jobs.map(job => 
                    job.id === editingJobId 
                    ? { ...job, title, company, location, type, applyLink, description }
                    : job
                );
                editingJobId = null;
            } else {
                // Create
                const newJob = {
                    id: Date.now(),
                    title, company, location, type, applyLink, description,
                    date: new Date().toLocaleDateString()
                };
                jobs.unshift(newJob); // add to top
            }

            saveToLocal();
            switchTab('board');
        }

        function editJob(id) {
            editingJobId = id;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteJob(id) {
            if(confirm("Are you sure you want to delete this job post?")) {
                jobs = jobs.filter(job => job.id !== id);
                saveToLocal();
                render();
            }
        }

        // --- RENDER FUNCTION ---
        function render() {
            const app = document.getElementById('app');
            
            // 1. Navigation
            let html = `
                <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
                    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between h-16 items-center">
                            <div class="flex items-center gap-2 cursor-pointer" onclick="switchTab('board')">
                                <div class="bg-blue-600 p-2 rounded-lg text-white">
                                    <i data-lucide="briefcase" class="w-5 h-5"></i>
                                </div>
                                <span class="font-bold text-xl tracking-tight text-slate-900">BD JobHub</span>
                            </div>
                            
                            <div class="flex gap-4">
                                <button onclick="switchTab('board')" class="px-4 py-2 rounded-md font-medium transition-colors ${activeTab === 'board' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}">
                                    <div class="flex items-center gap-2">
                                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                                        <span class="hidden sm:inline">Job Board</span>
                                    </div>
                                </button>
                                <button onclick="switchTab('admin')" class="px-4 py-2 rounded-md font-medium transition-colors ${activeTab === 'admin' ? 'bg-blue-600 text-white' : 'bg-slate-900 text-white hover:bg-slate-800'}">
                                    <div class="flex items-center gap-2">
                                        <i data-lucide="plus-circle" class="w-4 h-4"></i>
                                        <span class="hidden sm:inline">Post a Job</span>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
                <main class="flex-grow max-w-5xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            `;

            // 2. Main Content
            if (activeTab === 'board') {
                html += `
                    <div class="space-y-6">
                        <!-- Hero Banner -->
                        <div class="bg-blue-600 rounded-2xl p-8 text-white text-center shadow-lg relative overflow-hidden">
                            <div class="absolute top-0 right-0 opacity-10 pointer-events-none">
                                <i data-lucide="briefcase" class="w-48 h-48 -mt-10 -mr-10"></i>
                            </div>
                            <h1 class="text-3xl md:text-4xl font-bold mb-4">Find Your Dream Job Today</h1>
                            <p class="text-blue-100 mb-8 max-w-2xl mx-auto">Explore the latest job opportunities matching your skills and expertise.</p>
                            
                            <div class="bg-white rounded-lg p-2 flex items-center max-w-xl mx-auto shadow-md">
                                <i data-lucide="search" class="text-slate-400 ml-2 w-5 h-5"></i>
                                <input type="text" placeholder="Search job title or keyword..." class="w-full px-4 py-2 outline-none text-slate-800"/>
                                <button class="bg-blue-600 text-white px-6 py-2 rounded-md font-medium hover:bg-blue-700 transition-colors">Search</button>
                            </div>
                        </div>

                        <!-- Job List Header -->
                        <div class="flex justify-between items-end mt-10 mb-4">
                            <h2 class="text-2xl font-bold text-slate-900">Recent Jobs</h2>
                            <span class="text-sm text-slate-500">${jobs.length} jobs available</span>
                        </div>
                `;

                if (jobs.length === 0) {
                    html += `
                        <div class="text-center py-12 bg-white rounded-xl border border-slate-200">
                            <i data-lucide="briefcase" class="mx-auto h-12 w-12 text-slate-300 mb-3"></i>
                            <h3 class="text-lg font-medium text-slate-900">No jobs posted yet</h3>
                            <button onclick="switchTab('admin')" class="mt-4 text-blue-600 font-medium hover:underline">Post a Job Now</button>
                        </div>
                    `;
                } else {
                    html += `<div class="grid gap-4">`;
                    jobs.forEach(job => {
                        const isExpanded = expandedJobId === job.id;
                        const needsExpansion = job.description.length > 150;
                        
                        html += `
                            <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm hover:shadow-md transition-shadow group">
                                <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-4">
                                    <div class="flex-grow">
                                        <h3 class="text-xl font-bold text-slate-900 group-hover:text-blue-600 transition-colors">${job.title}</h3>
                                        <p class="text-slate-600 font-medium mt-1">${job.company}</p>
                                        
                                        <div class="flex flex-wrap items-center gap-4 mt-3 text-sm text-slate-500">
                                            <div class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-4 h-4"></i><span>${job.location}</span></div>
                                            <div class="flex items-center gap-1.5"><i data-lucide="clock" class="w-4 h-4"></i><span>${job.date}</span></div>
                                            <span class="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-full text-xs font-semibold">${job.type}</span>
                                        </div>
                                        
                                        <div class="mt-4 text-slate-600 text-sm leading-relaxed">
                                            <p class="${!isExpanded && needsExpansion ? 'line-clamp-2' : ''}">${job.description}</p>
                                            ${needsExpansion ? `
                                                <button onclick="toggleDescription(${job.id})" class="text-blue-600 font-medium mt-1 hover:underline focus:outline-none flex items-center gap-1">
                                                    ${isExpanded ? 'See Less' : 'See More'}
                                                </button>
                                            ` : ''}
                                        </div>
                                    </div>
                                    
                                    <div class="flex flex-col items-end gap-3 mt-4 md:mt-0 flex-shrink-0">
                                        <a href="${job.applyLink || '#'}" target="_blank" class="w-full md:w-auto text-center bg-slate-900 text-white px-6 py-2.5 rounded-lg font-medium hover:bg-blue-600 transition-colors whitespace-nowrap shadow-sm block">
                                            Apply Now
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                html += `</div>`;

            } else if (activeTab === 'admin') {
                if (!isAuthenticated) {
                    // Login Form
                    html += `
                        <div class="max-w-md mx-auto mt-10">
                            <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm text-center">
                                <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide="lock" class="text-blue-600 w-8 h-8"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-slate-900 mb-2">Admin Access</h2>
                                <p class="text-slate-500 mb-6 text-sm">Please enter the password to post or manage jobs.</p>
                                <form onsubmit="handleLogin(event)" class="space-y-4">
                                    <input type="password" id="admin_password" required placeholder="Enter password (admin123)" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center"/>
                                    <button type="submit" class="w-full bg-blue-600 text-white px-6 py-2.5 rounded-lg font-medium hover:bg-blue-700 transition-colors flex justify-center items-center gap-2">
                                        <i data-lucide="unlock" class="w-4 h-4"></i> Unlock Panel
                                    </button>
                                </form>
                            </div>
                        </div>
                    `;
                } else {
                    // Admin Panel
                    const jobToEdit = editingJobId ? jobs.find(j => j.id === editingJobId) : null;
                    
                    html += `
                        <div class="max-w-2xl mx-auto">
                            <div class="mb-6 flex justify-between items-start">
                                <div>
                                    <h2 class="text-2xl font-bold text-slate-900">${editingJobId ? 'Edit Job Post' : 'Post a New Job'}</h2>
                                    <p class="text-slate-500">${editingJobId ? 'Update the details of your job post below.' : 'Fill out the form below to publish a job on the board.'}</p>
                                </div>
                                <button onclick="handleLogout()" class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-slate-900 bg-white border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors">
                                    <i data-lucide="lock" class="w-4 h-4"></i> Lock Panel
                                </button>
                            </div>

                            <form onsubmit="handlePostJob(event)" class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-sm space-y-6">
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">Job Title</label>
                                    <input type="text" id="job_title" required value="${jobToEdit ? jobToEdit.title : ''}" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Senior Frontend Developer"/>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm font-semibold text-slate-700 mb-2">Company Name</label>
                                        <input type="text" id="company_name" required value="${jobToEdit ? jobToEdit.company : ''}" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Google Bangladesh"/>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-slate-700 mb-2">Location</label>
                                        <input type="text" id="job_location" required value="${jobToEdit ? jobToEdit.location : ''}" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Dhaka (Remote)"/>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm font-semibold text-slate-700 mb-2">Job Type</label>
                                        <select id="job_type" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                            <option value="Full-time" ${jobToEdit && jobToEdit.type === 'Full-time' ? 'selected' : ''}>Full-time</option>
                                            <option value="Part-time" ${jobToEdit && jobToEdit.type === 'Part-time' ? 'selected' : ''}>Part-time</option>
                                            <option value="Contract" ${jobToEdit && jobToEdit.type === 'Contract' ? 'selected' : ''}>Contract</option>
                                            <option value="Internship" ${jobToEdit && jobToEdit.type === 'Internship' ? 'selected' : ''}>Internship</option>
                                            <option value="Freelance" ${jobToEdit && jobToEdit.type === 'Freelance' ? 'selected' : ''}>Freelance</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-slate-700 mb-2">Application Link</label>
                                        <input type="url" id="apply_link" required value="${jobToEdit ? jobToEdit.applyLink : ''}" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. https://forms.gle/..."/>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">Job Description</label>
                                    <textarea id="job_description" required rows="4" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="Describe the role...">${jobToEdit ? jobToEdit.description : ''}</textarea>
                                </div>

                                <div class="pt-4 border-t border-slate-100 flex justify-end gap-3">
                                    <button type="button" onclick="${editingJobId ? 'editJob(null)' : "switchTab('board')"}" class="px-6 py-2.5 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
                                    <button type="submit" class="bg-blue-600 text-white px-8 py-2.5 rounded-lg font-medium hover:bg-blue-700 transition-colors shadow-sm">
                                        ${editingJobId ? 'Update Job' : 'Publish Job'}
                                    </button>
                                </div>
                            </form>

                            ${jobs.length > 0 ? `
                                <div class="mt-10 mb-10">
                                    <h3 class="text-lg font-bold text-slate-900 mb-4">Manage Posted Jobs</h3>
                                    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                                        ${jobs.map(job => `
                                            <div class="flex items-center justify-between p-4 border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                                                <div>
                                                    <p class="font-semibold text-slate-800">${job.title}</p>
                                                    <p class="text-sm text-slate-500">${job.company}</p>
                                                </div>
                                                <div class="flex gap-2">
                                                    <button onclick="editJob(${job.id})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Edit Job"><i data-lucide="edit" class="w-4 h-4"></i></button>
                                                    <button onclick="deleteJob(${job.id})" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Delete Job"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
            }

            html += `</main>`;

            // 3. Footer
            html += `
                <footer class="bg-white border-t border-slate-200 py-8 mt-auto">
                    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <p class="text-slate-500 text-sm">© ${new Date().getFullYear()} BD JobHub. All rights reserved.</p>
                            
                            <div class="flex items-center gap-6">
                                <a href="#" class="text-sm text-slate-500 hover:text-blue-600 font-medium">Terms of Use</a>
                                <a href="#" class="text-sm text-slate-500 hover:text-blue-600 font-medium">Privacy Policy</a>
                            </div>

                            <div class="flex items-center gap-3">
                                <a href="#" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 transition-colors">
                                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                </a>
                                <a href="#" class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center hover:bg-gray-800 transition-colors">
                                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                </a>
                                <a href="#" class="w-8 h-8 rounded-full bg-blue-700 text-white flex items-center justify-center hover:bg-blue-800 transition-colors">
                                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                                </a>
                            </div>
                        </div>
                    </div>
                </footer>
            `;

            // Insert HTML and Initialize Icons
            app.innerHTML = html;
            lucide.createIcons();
        }

        // Initial Render
        render();

    </script>
</body>
</html>
